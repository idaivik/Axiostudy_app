name: axiostudy_app
description: "AI-Powered Adaptive Learning Platform for JEE/NEET Students"
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  lucide_icons: ^0.257.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Math Rendering
  flutter_math_fork: ^0.7.2

  # Storage
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  supabase_flutter: ^2.12.4

  # Local notifications (immediate, on-device post-test nudge)
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  purchases_flutter: ^10.2.3

  # Push notifications (Feature 1 — server-driven reminder engine via FCM).
  # Dormant until the Firebase project config files are added (guarded init);
  # see supabase/functions/REMINDERS_SETUP.md.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/axiostudy_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
